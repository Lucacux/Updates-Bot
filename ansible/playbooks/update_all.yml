---
- name: Update Arch Linux
  hosts: arch
  become: true
  tasks:
    - name: Actualizar paquetes con pacman
      pacman:
        update_cache: yes
        upgrade: yes

- name: Update Ubuntu
  hosts: ubuntu
  become: true
  tasks:
    - name: Actualizar paquetes con apt
      apt:
        update_cache: yes
        upgrade: dist
        autoremove: yes

- name: Update Debian
  hosts: debian
  become: true
  tasks:
    - name: Actualizar paquetes con apt
      apt:
        update_cache: yes
        upgrade: dist
        autoremove: yes
